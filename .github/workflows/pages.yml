name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 10.0.x
      - name: Install WebAssembly tools
        run: dotnet workload install wasm-tools --skip-manifest-update
      - name: Publish browser GUI
        run: dotnet publish ./FE_Map_Creator.Gui.Browser/FE_Map_Creator.Gui.Browser.csproj -c Release -o "${{ runner.temp }}/web"
      - name: Validate static site
        shell: pwsh
        run: ./scripts/smoke-test-web.ps1 -PublishDirectory "${{ runner.temp }}/web"
      - name: Disable Jekyll processing
        run: touch "${{ runner.temp }}/web/wwwroot/.nojekyll"
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: ${{ runner.temp }}/web/wwwroot

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
