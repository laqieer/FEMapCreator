name: Publish Wiki

on:
  push:
    branches:
      - main
    paths:
      - "docs/user-guide/**"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: wiki
  cancel-in-progress: true

jobs:
  publish:
    name: Sync user guide to GitHub Wiki
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Publish wiki pages
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          remote="https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.wiki.git"
          if ! git ls-remote "${remote}" >/dev/null 2>&1; then
            echo "::error::The GitHub Wiki has not been initialized. Save its first page once in the GitHub web UI, then rerun this workflow."
            exit 1
          fi

          git clone "${remote}" wiki
          find wiki -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -R docs/user-guide/. wiki/
          python - <<'PY'
          from pathlib import Path
          import re

          link = re.compile(r"\]\(([^:/)#]+)\.md(#[^)]+)?\)")
          for page in Path("wiki").glob("*.md"):
              text = page.read_text(encoding="utf-8")
              text = link.sub(lambda match: f"]({match.group(1)}{match.group(2) or ''})", text)
              page.write_text(text, encoding="utf-8")
          PY

          cd wiki
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Wiki already matches docs/user-guide."
            exit 0
          fi

          git commit \
            -m "docs: sync project user guide" \
            -m "Co-authored-by: laqieer <laqieer@126.com>"
          git push origin HEAD
