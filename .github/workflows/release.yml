name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing v* tag to package and publish
        required: true
        type: string

permissions:
  contents: write
  discussions: write

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}

jobs:
  desktop:
    name: ${{ matrix.asset }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            asset: FE-Map-Creator-Windows-x64
            extension: zip
          - os: ubuntu-latest
            rid: linux-x64
            asset: FE-Map-Creator-Linux-x64
            extension: tar.gz
          - os: macos-latest
            rid: osx-x64
            asset: FE-Map-Creator-macOS-x64
            extension: tar.gz
          - os: macos-latest
            rid: osx-arm64
            asset: FE-Map-Creator-macOS-arm64
            extension: tar.gz
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ env.RELEASE_TAG }}
      - uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 10.0.x
      - name: Package desktop GUI
        shell: pwsh
        run: >
          ./scripts/package-desktop.ps1
          -Rid "${{ matrix.rid }}"
          -OutputDirectory "${{ runner.temp }}/desktop-${{ matrix.rid }}"
          -ArchivePath "${{ runner.temp }}/${{ matrix.asset }}-${{ env.RELEASE_TAG }}.${{ matrix.extension }}"
          -BundleVersion "${{ env.RELEASE_TAG }}"
          -AdHocSignMacBundle
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.asset }}
          path: ${{ runner.temp }}/${{ matrix.asset }}-${{ env.RELEASE_TAG }}.${{ matrix.extension }}
          retention-days: 1
          if-no-files-found: error

  web:
    name: FE-Map-Creator-Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ env.RELEASE_TAG }}
      - uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 10.0.x
      - name: Install WebAssembly tools
        run: dotnet workload install wasm-tools --skip-manifest-update
      - name: Package validated browser GUI
        shell: pwsh
        run: >
          ./scripts/package-web.ps1
          -OutputDirectory "${{ runner.temp }}/web"
          -ArchivePath "${{ runner.temp }}/FE-Map-Creator-Web-${{ env.RELEASE_TAG }}.zip"
      - uses: actions/upload-artifact@v7
        with:
          name: FE-Map-Creator-Web
          path: ${{ runner.temp }}/FE-Map-Creator-Web-${{ env.RELEASE_TAG }}.zip
          retention-days: 1
          if-no-files-found: error

  release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs:
      - desktop
      - web
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ env.RELEASE_TAG }}
      - uses: actions/download-artifact@v8
        with:
          path: release-assets
          merge-multiple: true
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          notes_file="${GITHUB_WORKSPACE}/docs/releases/${RELEASE_TAG}.md"
          notes_args=(--generate-notes)
          if [[ -f "${notes_file}" ]]; then
            notes_args=(--notes-file "${notes_file}")
          fi
          cd "${GITHUB_WORKSPACE}/release-assets"
          sha256sum ./* > SHA256SUMS.txt
          gh release create "${RELEASE_TAG}" \
            ./* \
            --repo "${GITHUB_REPOSITORY}" \
            --title "FE Map Creator ${RELEASE_TAG}" \
            --verify-tag \
            --discussion-category "Announcements" \
            "${notes_args[@]}"
