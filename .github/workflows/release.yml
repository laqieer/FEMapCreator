name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  desktop:
    name: ${{ matrix.asset }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            asset: FE-Map-Creator-Windows-x64
            archive: zip
          - os: ubuntu-latest
            rid: linux-x64
            asset: FE-Map-Creator-Linux-x64
            archive: tar
          - os: macos-latest
            rid: osx-x64
            asset: FE-Map-Creator-macOS-x64
            archive: tar
          - os: macos-latest
            rid: osx-arm64
            asset: FE-Map-Creator-macOS-arm64
            archive: tar
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 10.0.x
      - name: Publish desktop GUI
        shell: pwsh
        run: >
          dotnet publish ./FE_Map_Creator.Gui.Desktop/FE_Map_Creator.Gui.Desktop.csproj
          -c Release
          -r ${{ matrix.rid }}
          --self-contained true
          -p:DebugType=None
          -p:DebugSymbols=false
          -o "${{ runner.temp }}/publish"
      - name: Create macOS application bundle
        if: startsWith(matrix.rid, 'osx-')
        shell: bash
        run: |
          app="${RUNNER_TEMP}/FE Map Creator.app"
          mkdir -p "${app}/Contents/MacOS"
          cp -R "${RUNNER_TEMP}/publish/." "${app}/Contents/MacOS/"
          rm -f "${app}/Contents/MacOS/README.md"
          chmod +x "${app}/Contents/MacOS/FE_Map_Creator.Gui.Desktop"
          cat > "${app}/Contents/Info.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleDisplayName</key><string>FE Map Creator</string>
            <key>CFBundleExecutable</key><string>FE_Map_Creator.Gui.Desktop</string>
            <key>CFBundleIdentifier</key><string>com.laqieer.FEMapCreator</string>
            <key>CFBundleName</key><string>FE Map Creator</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>CFBundleShortVersionString</key><string>${GITHUB_REF_NAME#v}</string>
            <key>CFBundleVersion</key><string>${GITHUB_REF_NAME#v}</string>
            <key>LSMinimumSystemVersion</key><string>12.0</string>
            <key>NSHighResolutionCapable</key><true/>
          </dict>
          </plist>
          EOF
          codesign --force --deep --sign - "${app}"
          rm -rf "${RUNNER_TEMP}/publish"
          mkdir -p "${RUNNER_TEMP}/publish"
          mv "${app}" "${RUNNER_TEMP}/publish/"
          cp README.md "${RUNNER_TEMP}/publish/README.md"
      - name: Create ZIP
        if: matrix.archive == 'zip'
        shell: pwsh
        run: Compress-Archive -Path "${{ runner.temp }}\publish\*" -DestinationPath "${{ runner.temp }}\${{ matrix.asset }}-${{ github.ref_name }}.zip"
      - name: Create tarball
        if: matrix.archive == 'tar'
        shell: bash
        run: tar -czf "${RUNNER_TEMP}/${{ matrix.asset }}-${GITHUB_REF_NAME}.tar.gz" -C "${RUNNER_TEMP}/publish" .
      - uses: actions/upload-artifact@v7
        if: matrix.archive == 'zip'
        with:
          name: ${{ matrix.asset }}
          path: ${{ runner.temp }}/${{ matrix.asset }}-${{ github.ref_name }}.zip
          if-no-files-found: error
      - uses: actions/upload-artifact@v7
        if: matrix.archive == 'tar'
        with:
          name: ${{ matrix.asset }}
          path: ${{ runner.temp }}/${{ matrix.asset }}-${{ github.ref_name }}.tar.gz
          if-no-files-found: error

  web:
    name: FE-Map-Creator-Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 10.0.x
      - name: Install WebAssembly tools
        run: dotnet workload install wasm-tools --skip-manifest-update
      - name: Publish browser GUI
        run: dotnet publish ./FE_Map_Creator.Gui.Browser/FE_Map_Creator.Gui.Browser.csproj -c Release -o "${RUNNER_TEMP}/web"
      - name: Validate static site
        shell: pwsh
        run: ./scripts/smoke-test-web.ps1 -PublishDirectory "${{ runner.temp }}/web"
      - name: Package Web build
        run: |
          touch "${RUNNER_TEMP}/web/wwwroot/.nojekyll"
          cd "${RUNNER_TEMP}/web/wwwroot"
          zip -qr "${RUNNER_TEMP}/FE-Map-Creator-Web-${GITHUB_REF_NAME}.zip" .
      - uses: actions/upload-artifact@v7
        with:
          name: FE-Map-Creator-Web
          path: ${{ runner.temp }}/FE-Map-Creator-Web-${{ github.ref_name }}.zip

  release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs:
      - desktop
      - web
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: release-assets
          merge-multiple: true
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cd release-assets
          sha256sum * > SHA256SUMS.txt
          gh release create "${GITHUB_REF_NAME}" \
            ./* \
            --repo "${GITHUB_REPOSITORY}" \
            --title "FE Map Creator ${GITHUB_REF_NAME}" \
            --generate-notes
